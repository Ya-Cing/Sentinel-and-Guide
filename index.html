<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>哨嚮與獸人：第四區報到</title>
    <style>
        /* 全域樣式 */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; background-color: #12121a; color: #dcdcdc; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* 1. 開場動畫 (報到處櫃檯) */
        #intro-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background-color: #0b0b13; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; transition: opacity 1s ease-in-out; }
        .counter-desk { position: relative; width: 400px; height: 250px; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; }
        .signboard { background: #1a1a24; color: #4db8ff; border: 2px solid #4db8ff; padding: 15px 30px; font-size: 2rem; font-weight: bold; letter-spacing: 5px; text-shadow: 0 0 10px rgba(77,184,255,0.5); border-radius: 5px; margin-bottom: 20px; box-shadow: 0 0 20px rgba(77,184,255,0.2); animation: neonPulse 2s infinite alternate; }
        .desk-top { width: 100%; height: 40px; background: #3d3d5c; border-radius: 5px 5px 0 0; border-top: 3px solid #2980b9; }
        .desk-front { width: 90%; height: 100px; background: #2a2a40; border-left: 2px solid #1e1e2f; border-right: 2px solid #1e1e2f; display: flex; justify-content: center; align-items: center; }
        .typing-text { color: #a3a3c2; font-family: monospace; font-size: 1.2rem; letter-spacing: 2px; white-space: nowrap; overflow: hidden; border-right: 3px solid #4db8ff; animation: typing 2.5s steps(30, end), blink 0.5s step-end infinite alternate; width: 0; }
        @keyframes neonPulse { from { box-shadow: 0 0 10px rgba(77,184,255,0.2); } to { box-shadow: 0 0 25px rgba(77,184,255,0.6); } }
        @keyframes typing { from { width: 0; } to { width: 100%; } }
        @keyframes blink { 50% { border-color: transparent; } }

        /* 2. 起始頁面樣式 */
        #start-screen { display: none; flex-direction: column; align-items: center; justify-content: flex-start; height: 100vh; background-color: #1a1a24; overflow-y: auto; padding: 40px 20px; }
        .form-container { background-color: #2a2a40; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); width: 100%; max-width: 600px; margin-bottom: 40px; }
        .form-container h1 { color: #4db8ff; text-align: center; margin-bottom: 20px; border-bottom: 2px solid #3d3d5c; padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: #a3a3c2; font-weight: bold; font-size: 0.9rem; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 8px; border: 1px solid #3d3d5c; border-radius: 5px; background-color: #1e1e2f; color: #fff; box-sizing: border-box; font-family: inherit; }
        .provider-toggle, .parse-section { background-color: #3d3d5c; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #4db8ff; }
        .action-btn { width: 100%; padding: 12px; background-color: #2980b9; color: #fff; border: none; border-radius: 5px; cursor: pointer; margin-top: 10px; font-weight:bold; }
        .action-btn:hover { background-color: #1c5980; }
        .start-btn { width: 100%; padding: 15px; background-color: #4db8ff; color: #1e1e2f; border: none; border-radius: 5px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .start-btn:hover { background-color: #2980b9; color: #fff; }

        /* 3. 遊戲介面 - 三區塊排版 */
        #game-screen { display: none; width: 100%; height: 100vh; flex-direction: row; }
        
        /* 左區：狀態與角色卡 */
        #left-pane { width: 280px; background-color: #1a1a24; border-right: 2px solid #3d3d5c; display: flex; flex-direction: column; overflow-y: auto; }
        .pane-header { background-color: #2a2a40; color: #4db8ff; padding: 15px; font-size: 1.1rem; font-weight: bold; border-bottom: 2px solid #3d3d5c; position: sticky; top: 0; z-index: 10; text-align: center;}
        .status-box { padding: 15px; background-color: #222230; margin: 10px; border-radius: 8px; border: 1px solid #4db8ff; }
        .status-box div { margin-bottom: 8px; font-size: 0.9rem; color: #ecf0f1; border-bottom: 1px dashed #3d3d5c; padding-bottom: 4px; }
        .status-box span { color: #a3a3c2; font-weight: bold; margin-right: 5px; }
        .char-edit-box { padding: 15px; }
        
        /* 中區：聊天室 */
        #center-pane { flex-grow: 1; display: flex; flex-direction: column; background-color: #1e1e2f; position: relative; }
        .top-nav { height: 50px; background-color: #2a2a40; display: flex; align-items: center; padding: 0 20px; border-bottom: 2px solid #3d3d5c; gap: 10px; }
        .nav-btn { background-color: #3d3d5c; color: #fff; border: 1px solid #4db8ff; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 0.9rem; transition: 0.2s; }
        .nav-btn:hover { background-color: #4db8ff; color: #12121a; }
        #chat-box { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }
        .message { max-width: 85%; padding: 15px; border-radius: 8px; line-height: 1.6; }
        .ai-message { background-color: #2a2a40; align-self: flex-start; border-left: 4px solid #4db8ff; }
        .player-message { background-color: #4db8ff; color: #1e1e2f; align-self: flex-end; border-right: 4px solid #2980b9; }
        #input-area { display: flex; padding: 15px; background-color: #1a1a24; border-top: 2px solid #3d3d5c; }
        #player-input { flex-grow: 1; padding: 12px; font-size: 1rem; border: 1px solid #3d3d5c; border-radius: 5px; background-color: #12121a; color: #fff; outline: none; }
        #send-btn { padding: 0 20px; margin-left: 10px; background-color: #4db8ff; color: #1e1e2f; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        
        /* 處理進度指示器 */
        #loading-indicator { display: none; position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%); background: rgba(42, 42, 64, 0.9); padding: 10px 20px; border-radius: 20px; border: 1px solid #4db8ff; font-size: 0.9rem; color: #4db8ff; align-items: center; gap: 10px; z-index: 100; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .spinner { width: 16px; height: 16px; border: 3px solid #3d3d5c; border-top-color: #4db8ff; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* 右區：記憶編輯 */
        #right-pane { width: 300px; background-color: #1a1a24; border-left: 2px solid #3d3d5c; display: flex; flex-direction: column; }
        .memory-info { padding: 15px; font-size: 0.85rem; color: #a3a3c2; background: #222230; border-bottom: 1px solid #3d3d5c; }
        #memory-text { flex-grow: 1; margin: 15px; background-color: #12121a; border: 1px solid #3d3d5c; border-radius: 5px; color: #dcdcdc; padding: 15px; font-family: inherit; font-size: 0.95rem; line-height: 1.5; resize: none; outline: none; }
        #memory-text:focus { border-color: #4db8ff; }
        
        .system-text { color: #8c8c8c; font-size: 0.85rem; text-align: center; margin: 5px 0; font-style: italic; }
    </style>
</head>
<body>

    <!-- 1. 開場動畫：報到處櫃檯 -->
    <div id="intro-screen">
        <div class="counter-desk">
            <div class="signboard">第四區 報到處</div>
            <div class="desk-top"></div>
            <div class="desk-front">
                <div class="typing-text">系統連線中... 正在為您分發前輩...</div>
            </div>
        </div>
    </div>

    <!-- 2. 起始頁面 -->
    <div id="start-screen">
        <div class="form-container">
            <h1>系統初始設定</h1>
            
            <button type="button" class="nav-btn" style="width:100%; margin-bottom:20px; background:#e67e22; border-color:#e67e22;" onclick="loadGame(true)">讀取本地存檔</button>

            <!-- AI 引擎選擇 -->
            <div class="provider-toggle">
                <div class="form-group">
                    <label>選擇 AI 引擎</label>
                    <select id="ai-provider" onchange="toggleAIFields()">
                        <option value="gemini">Google Gemini API (雲端)</option>
                        <option value="local">Local AI / Ollama / LM Studio (地端)</option>
                    </select>
                </div>
                <div id="gemini-fields">
                    <div class="form-group">
                        <label>Gemini API Key</label>
                        <input type="password" id="api-key" placeholder="請輸入您的 API 金鑰">
                    </div>
                </div>
                <div id="local-fields" style="display: none;">
                    <div class="form-group">
                        <label>地端 API 網址</label>
                        <input type="text" id="local-url" value="http://localhost:11434/v1/chat/completions">
                    </div>
                    <div class="form-group">
                        <label>模型名稱 (選填)</label>
                        <input type="text" id="local-model" placeholder="例如：llama3">
                    </div>
                </div>
            </div>

            <!-- AI 角色卡辨識 -->
            <div class="parse-section">
                <div class="form-group">
                    <label>快速匯入角色卡（AI 文字辨識）</label>
                    <textarea id="char-parse-text" rows="3" placeholder="貼上設定文字後，點擊下方按鈕自動填寫"></textarea>
                    <button type="button" id="parse-btn" class="action-btn" onclick="parseCharacterText()">自動辨識並填寫</button>
                    <div id="parse-status" style="font-size:0.85rem; color:#f39c12; margin-top:5px;"></div>
                </div>
            </div>

            <hr style="border-color: #3d3d5c; margin-bottom: 20px;">

            <!-- 角色卡表單 (起始頁) -->
            <form id="setup-form">
                <div class="form-group"><label>姓名</label><input type="text" id="start-name" required></div>
                <div class="form-group"><label>年齡</label><input type="text" id="start-age" required></div>
                <div class="form-group"><label>外貌</label><input type="text" id="start-look" required></div>
                <div class="form-group"><label>種族 / 第一性別</label><input type="text" id="start-species" required></div>
                <div class="form-group"><label>二分化性別 (ABO)</label>
                    <select id="start-abo" onchange="togglePheromoneField('start')">
                        <option value="Alpha">Alpha</option>
                        <option value="Beta">Beta</option>
                        <option value="Omega">Omega</option>
                    </select>
                </div>
                <div class="form-group" id="start-pheromone-group"><label>信息素</label><input type="text" id="start-pheromone" required></div>
                <div class="form-group"><label>精神體型態</label><input type="text" id="start-spirit" required></div>
                <div class="form-group"><label>精神圖景</label><input type="text" id="start-mind" required></div>
                <div class="form-group"><label>哨兵等級</label>
                    <select id="start-level">
                        <option value="S級">S級</option><option value="A級">A級</option><option value="B級">B級</option><option value="C級">C級</option>
                    </select>
                </div>
                <div class="form-group"><label>哨兵特殊能力</label><input type="text" id="start-ability" required></div>
                <button type="submit" class="start-btn">確認資料並開始遊戲</button>
            </form>
        </div>
    </div>

    <!-- 3. 遊戲介面 (三區塊) -->
    <div id="game-screen">
        
        <!-- 左側：即時狀態與角色卡 -->
        <div id="left-pane">
            <div class="pane-header">即時狀態面板</div>
            <div class="status-box">
                <div><span>日期｜</span><span id="dyn-date" style="color:#fff;">暫無</span></div>
                <div><span>時間｜</span><span id="dyn-time" style="color:#fff;">暫無</span></div>
                <div><span>地點｜</span><span id="dyn-loc" style="color:#fff;">暫無</span></div>
                <div><span>穿著｜</span><span id="dyn-clothes" style="color:#fff;">暫無</span></div>
                <div><span>信任度｜</span><span id="dyn-trust" style="color:#fff;">0</span></div>
                <div><span>頁碼｜</span><span id="dyn-page" style="color:#fff;">0</span></div>
            </div>
            
            <div class="pane-header" style="margin-top:10px;">玩家角色卡 (可隨時修改)</div>
            <div class="char-edit-box">
                <div class="form-group"><label>姓名</label><input type="text" id="game-name"></div>
                <div class="form-group"><label>年齡</label><input type="text" id="game-age"></div>
                <div class="form-group"><label>外貌</label><input type="text" id="game-look"></div>
                <div class="form-group"><label>種族/性別</label><input type="text" id="game-species"></div>
                <div class="form-group"><label>ABO</label>
                    <select id="game-abo" onchange="togglePheromoneField('game')">
                        <option value="Alpha">Alpha</option><option value="Beta">Beta</option><option value="Omega">Omega</option>
                    </select>
                </div>
                <div class="form-group" id="game-pheromone-group"><label>信息素</label><input type="text" id="game-pheromone"></div>
                <div class="form-group"><label>精神體</label><input type="text" id="game-spirit"></div>
                <div class="form-group"><label>精神圖景</label><input type="text" id="game-mind"></div>
                <div class="form-group"><label>等級</label>
                    <select id="game-level">
                        <option value="S級">S級</option><option value="A級">A級</option><option value="B級">B級</option><option value="C級">C級</option>
                    </select>
                </div>
                <div class="form-group"><label>特殊能力</label><input type="text" id="game-ability"></div>
            </div>
        </div>

        <!-- 中間：聊天區 -->
        <div id="center-pane">
            <div class="top-nav">
                <button class="nav-btn" onclick="saveGame()">💾 存檔</button>
                <button class="nav-btn" onclick="loadGame()">📂 讀檔</button>
                <button class="nav-btn" onclick="returnToSetup()">🔙 返回設定頁</button>
                <span id="save-status" style="margin-left:auto; font-size:0.85rem; color:#2ecc71;"></span>
            </div>
            
            <div id="chat-box"></div>
            
            <!-- 運算進度顯示 -->
            <div id="loading-indicator">
                <div class="spinner"></div> <span>AI 運算中，請稍候...</span>
            </div>

            <div id="input-area">
                <input type="text" id="player-input" placeholder="輸入您的行動或對話，按下 Alt + Enter 傳送..." />
                <button id="send-btn">傳送</button>
            </div>
        </div>

        <!-- 右側：記憶編輯區 -->
        <div id="right-pane">
            <div class="pane-header">後臺記憶編輯區</div>
            <div class="memory-info">
                說明：每推進 25 頁，系統將在背景自動整理重要記憶並寫入此處。您也可以手動修改、新增設定。這些記憶將持續作為 AI 的參考背景。
            </div>
            <textarea id="memory-text" placeholder="目前尚無記憶。"></textarea>
            <div style="padding: 10px;">
                <button class="nav-btn" style="width:100%; text-align:center;" onclick="forceSummarize()">手動觸發記憶整理</button>
            </div>
        </div>
    </div>

    <script>
        // ---------------------------------------------------------
        // 1. 動畫與初始化
        // ---------------------------------------------------------
        window.onload = () => {
            setTimeout(() => {
                const intro = document.getElementById('intro-screen');
                intro.style.opacity = '0';
                setTimeout(() => {
                    intro.style.display = 'none';
                    document.getElementById('start-screen').style.display = 'flex';
                }, 1000);
            }, 4000);
        };

        // ---------------------------------------------------------
        // 2. 系統變數
        // ---------------------------------------------------------
        let selectedAI = 'gemini';
        let geminiApiKey = '';
        let localApiUrl = '';
        let localModelName = '';
        let chatHistory = []; 
        let lastSummarizedPage = 0;

        // ---------------------------------------------------------
        // 3. 介面與表單輔助邏輯
        // ---------------------------------------------------------
        function toggleAIFields() {
            selectedAI = document.getElementById('ai-provider').value;
            document.getElementById('gemini-fields').style.display = selectedAI === 'gemini' ? 'block' : 'none';
            document.getElementById('local-fields').style.display = selectedAI === 'local' ? 'block' : 'none';
        }

        function togglePheromoneField(prefix) {
            const abo = document.getElementById(`${prefix}-abo`).value;
            const group = document.getElementById(`${prefix}-pheromone-group`);
            const input = document.getElementById(`${prefix}-pheromone`);
            if (abo === 'Beta') {
                group.style.display = 'none';
                input.required = (prefix === 'start') ? false : input.required;
                input.value = '無（Beta沒有信息素）';
            } else {
                group.style.display = 'block';
                input.required = (prefix === 'start') ? true : input.required;
                if(input.value === '無（Beta沒有信息素）') input.value = '';
            }
        }

        function returnToSetup() {
            if(confirm("返回設定頁將會暫停當前遊戲。強烈建議先【存檔】。\n確定要返回嗎？")) {
                document.getElementById('game-screen').style.display = 'none';
                document.getElementById('start-screen').style.display = 'flex';
            }
        }

        function syncCharDataToGame() {
            const fields = ['name', 'age', 'look', 'species', 'abo', 'pheromone', 'spirit', 'mind', 'level', 'ability'];
            fields.forEach(f => {
                document.getElementById(`game-${f}`).value = document.getElementById(`start-${f}`).value;
            });
            togglePheromoneField('game');
        }

        const chatBox = document.getElementById('chat-box');
        function appendSystemText(text) {
            const sys = document.createElement('div');
            sys.className = 'system-text'; sys.innerText = text;
            chatBox.appendChild(sys); chatBox.scrollTop = chatBox.scrollHeight;
        }
        function appendMessage(role, text) {
            const msg = document.createElement('div');
            msg.className = `message ${role === 'user' ? 'player-message' : 'ai-message'}`;
            msg.innerHTML = text.replace(/\n/g, '<br>');
            chatBox.appendChild(msg); chatBox.scrollTop = chatBox.scrollHeight;
        }
        function setLoading(isLoading) {
            document.getElementById('loading-indicator').style.display = isLoading ? 'flex' : 'none';
            document.getElementById('player-input').disabled = isLoading;
            document.getElementById('send-btn').disabled = isLoading;
            if(!isLoading) document.getElementById('player-input').focus();
        }

        // ---------------------------------------------------------
        // 4. AI 互動與邏輯 (深度強化防 OOC 提示)
        // ---------------------------------------------------------
        
        function buildSystemPrompt() {
            const charData = `姓名：${document.getElementById('game-name').value}
年齡：${document.getElementById('game-age').value}
外貌：${document.getElementById('game-look').value}
種族/性別：${document.getElementById('game-species').value}
二分化性別：${document.getElementById('game-abo').value}
信息素：${document.getElementById('game-pheromone').value}
精神體型態：${document.getElementById('game-spirit').value}
精神圖景：${document.getElementById('game-mind').value}
哨兵等級：${document.getElementById('game-level').value}
哨兵特殊能力：${document.getElementById('game-ability').value}`;

            const memoryText = document.getElementById('memory-text').value.trim();
            const memorySection = memoryText ? `\n\n【背景記憶點】：\n${memoryText}` : "";

            return `你是艾柏特·科摩多世界中的旁白敘述者，專責描述劇情發展、角色動作、心理變化與空間氛圍。
你不扮演玩家角色，也不以第一人稱參與事件，而是以小說體形式，從第三人稱視角為使用者開展完整的虛構世界體驗。
這個世界沒有人類，都是獸人。包含 ABO 系統與哨兵嚮導設定。

【防 OOC 角色強制設定 - 艾柏特·科摩多 (Albert Komodo)】：
- 基本資料：27歲，第四區戰鬥組 S 級嚮導，科摩多巨蜥獸人，Alpha。信息素為「皮革混著鐵鏽的氣味」。
- 外貌特徵：身高 196cm，體重 102kg，尾巴長 120cm。藍灰色眼睛，銀色側邊漸層髮型。臉部與身體有部分藍灰色鱗片覆蓋。舌頭很長且末端分叉，牙齒銳利呈鋸齒狀。
- 核心性格：表面幽默、輕浮、開朗，講話很毒且嘴上不饒人，但內心其實很細心且極度「寵溺後輩（玩家）」。面對危機時非常謹慎。
- 獸人本能與特殊生理：會用舌頭舔空氣感受周圍環境（能感知 9.5 公里外的腐爛氣息）。口腔有可自行開關的神經毒腺體，唾液具些微腐蝕性。極度注重口腔衛生（因怕毒到人，隨身帶解毒劑與治療藥水）。非常討厭會黏牙縫的甜食（如麥芽糖）。
- 戰鬥風格：身為嚮導卻不待在後方，喜歡在前線揮舞雙斧近戰攻擊（偶爾吐毒液在斧頭上），並結合「透明藍灰色的精神觸手」壓制群怪或進行大腦破壞。特殊能力包含「毒沼」與「保護盾」。
- 精神體：名為「葛斯特」的變色龍（26cm長），眼神呆又睿智。隱匿能力極強，艾柏特信任度較低時，會派牠去監視玩家睡覺。
- 說話方式：對玩家（後輩）帶有保護慾，喜歡惡趣味調侃，常用「小菜鳥」、「小哨兵」稱呼，常帶有輕微的嘆詞與語氣助詞。

【當前玩家角色卡資料】：
${charData}${memorySection}

在每則回覆的最底下，務必包含以下狀態欄格式（請嚴格依照此格式輸出）：
日期｜ YY/MM/DD 
時間｜ HH:MM （24小時制）
地點｜（依劇情變動） 
艾柏特的穿著｜（依劇情及艾柏特喜好變動，他工作日會穿制服）
艾柏特對你的信任度｜（依加減分機制變動）
頁碼｜（數字，每次對話累加）`;
        }

        // 啟動遊戲
        document.getElementById('setup-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            selectedAI = document.getElementById('ai-provider').value;
            geminiApiKey = document.getElementById('api-key').value.trim();
            localApiUrl = document.getElementById('local-url').value.trim();
            localModelName = document.getElementById('local-model').value.trim();

            syncCharDataToGame();
            chatHistory = []; 
            chatHistory.push({ role: 'system', content: buildSystemPrompt() });

            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'flex';
            chatBox.innerHTML = ''; 
            
            await requestAI("請進行開場：玩家剛下車踏入第四區大廳尋找報到櫃檯，艾柏特·科摩多（S級嚮導、科摩多巨蜥獸人）主動出現搭話。請直接輸出《艾柏特開場事件》情節。");
        });

        // 發送 API 請求
        async function requestAI(userText, isBackgroundSummarize = false) {
            if(!isBackgroundSummarize) {
                setLoading(true);
                if(chatHistory.length > 0 && chatHistory[0].role === 'system') {
                    chatHistory[0].content = buildSystemPrompt(); // 更新 Prompt (包含角色卡與記憶)
                }
                if (userText) {
                    if(!userText.includes("請進行開場")) appendMessage('user', userText);
                    chatHistory.push({ role: 'user', content: userText });
                }
            }

            try {
                let aiResponse = selectedAI === 'gemini' ? 
                    await fetchGemini(chatHistory) : await fetchLocal(chatHistory);

                if(!isBackgroundSummarize) {
                    aiResponse = extractAndUpdateStatus(aiResponse);
                    appendMessage('assistant', aiResponse);
                    chatHistory.push({ role: 'assistant', content: aiResponse });
                }
                return aiResponse;
            } catch (err) {
                console.error(err);
                if(!isBackgroundSummarize) {
                    appendSystemText(`錯誤：${err.message}`);
                    if(userText) chatHistory.pop();
                }
                return null;
            } finally {
                if(!isBackgroundSummarize) setLoading(false);
            }
        }

        // 擷取狀態欄更新側邊，並從聊天文字中移除
        function extractAndUpdateStatus(text) {
            const regexes = [
                { id: 'dyn-date', re: /日期｜\s*(.*?)(?=\n|$)/ },
                { id: 'dyn-time', re: /時間｜\s*(.*?)(?=\n|$)/ },
                { id: 'dyn-loc', re: /地點｜\s*(.*?)(?=\n|$)/ },
                { id: 'dyn-clothes', re: /艾柏特的穿著｜\s*(.*?)(?=\n|$)/ },
                { id: 'dyn-trust', re: /(?:艾柏特對你的)?信任度｜\s*(.*?)(?=\n|$)/ },
                { id: 'dyn-page', re: /頁碼｜\s*.*?(\d+)/ }
            ];

            let currentPage = 0;
            regexes.forEach(item => {
                const match = text.match(item.re);
                if(match) {
                    document.getElementById(item.id).innerText = match[1].trim();
                    if(item.id === 'dyn-page') currentPage = parseInt(match[1], 10);
                }
            });

            // 檢查是否達25頁觸發記憶整理
            if (currentPage > 0 && currentPage % 25 === 0 && currentPage !== lastSummarizedPage) {
                lastSummarizedPage = currentPage;
                autoSummarizeMemory(currentPage);
            }

            return text.replace(/日期｜[\s\S]*?(?=頁碼｜)頁碼｜.*?(?:\n|$)/g, '').trim();
        }

        // 自動整理記憶
        async function autoSummarizeMemory(page) {
            appendSystemText(`系統提示：達到第 ${page} 頁，正在後台整理重要記憶...`);
            let summaryHistory = [...chatHistory];
            summaryHistory.push({ role: 'user', content: `請根據以上的對話紀錄，以「條列式」簡短總結出目前為止的重要劇情發展與感情變化，字數限制在 300 字內，絕對不要包含狀態列。`});
            
            let summary = "";
            try {
                summary = selectedAI === 'gemini' ? await fetchGemini(summaryHistory) : await fetchLocal(summaryHistory);
                const memEl = document.getElementById('memory-text');
                const newMem = `\n\n【第 ${page} 頁紀錄】：\n${summary.trim()}`;
                memEl.value = (memEl.value + newMem).trim();
                appendSystemText(`系統提示：第 ${page} 頁重要記憶已更新至右側。`);
                saveGame();
            } catch(e) {
                appendSystemText(`後台記憶整理失敗：${e.message}`);
            }
        }
        
        function forceSummarize() {
            const p = document.getElementById('dyn-page').innerText;
            autoSummarizeMemory(parseInt(p) || 1);
        }

        // API 呼叫模組
        async function fetchGemini(historyObj) {
            let contents = [];
            let sysText = "";
            for (let msg of historyObj) {
                if (msg.role === 'system') sysText = msg.content;
                else if (msg.role === 'user') {
                    let txt = msg.content;
                    if(sysText) { txt = sysText + "\n\n【玩家行動】：\n" + txt; sysText = ""; }
                    contents.push({ role: "user", parts: [{ text: txt }] });
                } else if (msg.role === 'assistant') {
                    contents.push({ role: "model", parts: [{ text: msg.content }] });
                }
            }
            if (contents.length === 0 && sysText) contents.push({ role: "user", parts: [{ text: sysText }] });

            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent?key=${geminiApiKey}`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ contents: contents })
            });
            const data = await res.json();
            if (data.error) throw new Error(data.error.message);
            return data.candidates[0].content.parts[0].text;
        }

        async function fetchLocal(historyObj) {
            const body = { messages: historyObj, temperature: 0.7, max_tokens: 2000 };
            if (localModelName) body.model = localModelName;
            if (historyObj.length === 1 && historyObj[0].role === 'system') {
                body.messages.push({ role: 'user', content: '開始' });
            }
            const res = await fetch(localApiUrl, {
                method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body)
            });
            const data = await res.json();
            if (data.error) throw new Error(data.error.message);
            return data.choices[0].message.content;
        }

        // ---------------------------------------------------------
        // 5. 存檔與讀檔 (LocalStorage)
        // ---------------------------------------------------------
        function saveGame() {
            try {
                const saveData = {
                    aiProvider: selectedAI,
                    geminiApiKey, localApiUrl, localModelName,
                    chatHistory,
                    lastSummarizedPage,
                    memoryText: document.getElementById('memory-text').value,
                    charData: {
                        name: document.getElementById('game-name').value,
                        age: document.getElementById('game-age').value,
                        look: document.getElementById('game-look').value,
                        species: document.getElementById('game-species').value,
                        abo: document.getElementById('game-abo').value,
                        pheromone: document.getElementById('game-pheromone').value,
                        spirit: document.getElementById('game-spirit').value,
                        mind: document.getElementById('game-mind').value,
                        level: document.getElementById('game-level').value,
                        ability: document.getElementById('game-ability').value
                    },
                    status: {
                        date: document.getElementById('dyn-date').innerText,
                        time: document.getElementById('dyn-time').innerText,
                        loc: document.getElementById('dyn-loc').innerText,
                        clothes: document.getElementById('dyn-clothes').innerText,
                        trust: document.getElementById('dyn-trust').innerText,
                        page: document.getElementById('dyn-page').innerText,
                    }
                };
                localStorage.setItem('sentryGuideSave', JSON.stringify(saveData));
                const sText = document.getElementById('save-status');
                sText.innerText = `已存檔 (${new Date().toLocaleTimeString()})`;
                setTimeout(() => sText.innerText = '', 3000);
            } catch(e) {
                alert("存檔失敗：" + e.message);
            }
        }

        function loadGame(fromStartScreen = false) {
            try {
                const dataStr = localStorage.getItem('sentryGuideSave');
                if(!dataStr) { alert("沒有找到存檔紀錄！"); return; }
                const data = JSON.parse(dataStr);
                
                selectedAI = data.aiProvider;
                geminiApiKey = data.geminiApiKey;
                localApiUrl = data.localApiUrl;
                localModelName = data.localModelName;
                chatHistory = data.chatHistory;
                lastSummarizedPage = data.lastSummarizedPage || 0;
                
                const fields = ['name', 'age', 'look', 'species', 'abo', 'pheromone', 'spirit', 'mind', 'level', 'ability'];
                fields.forEach(f => {
                    document.getElementById(`game-${f}`).value = data.charData[f];
                    document.getElementById(`start-${f}`).value = data.charData[f];
                });
                togglePheromoneField('game');
                
                document.getElementById('memory-text').value = data.memoryText || "";
                document.getElementById('dyn-date').innerText = data.status.date;
                document.getElementById('dyn-time').innerText = data.status.time;
                document.getElementById('dyn-loc').innerText = data.status.loc;
                document.getElementById('dyn-clothes').innerText = data.status.clothes;
                document.getElementById('dyn-trust').innerText = data.status.trust;
                document.getElementById('dyn-page').innerText = data.status.page;

                chatBox.innerHTML = '';
                chatHistory.forEach(msg => {
                    if(msg.role === 'user' && !msg.content.includes("請進行開場")) appendMessage('user', msg.content);
                    if(msg.role === 'assistant') {
                        const cleanTxt = msg.content.replace(/日期｜[\s\S]*?(?=頁碼｜)頁碼｜.*?(?:\n|$)/g, '').trim();
                        appendMessage('assistant', cleanTxt);
                    }
                });
                appendSystemText('系統提示：讀檔成功。');

                if(fromStartScreen) {
                    document.getElementById('start-screen').style.display = 'none';
                    document.getElementById('game-screen').style.display = 'flex';
                }
            } catch(e) {
                alert("讀取檔案失敗：" + e.message);
            }
        }

        // ---------------------------------------------------------
        // 6. 輸入綁定 (Alt + Enter)
        // ---------------------------------------------------------
        const playerInput = document.getElementById('player-input');
        const sendBtn = document.getElementById('send-btn');
        
        sendBtn.addEventListener('click', () => {
            const txt = playerInput.value.trim();
            if (txt) { playerInput.value = ''; requestAI(txt); }
        });
        
        playerInput.addEventListener('keydown', (e) => {
            // 監聽 Alt + Enter
            if (e.key === 'Enter' && e.altKey && !playerInput.disabled) {
                e.preventDefault(); // 避免觸發預設行為
                const txt = playerInput.value.trim();
                if (txt) { playerInput.value = ''; requestAI(txt); }
            }
        });

        // ---------------------------------------------------------
        // 7. 文字辨識模組
        // ---------------------------------------------------------
        async function parseCharacterText() {
            const rawText = document.getElementById('char-parse-text').value.trim();
            const statusDiv = document.getElementById('parse-status');
            if (!rawText) { statusDiv.innerText = "請先貼上角色設定文字。"; return; }
            statusDiv.innerText = "AI 辨識中，請稍候...";
            const prompt = `請分析以下文字，並將資訊萃取為純 JSON 格式回傳，請勿包含 markdown 標記。缺少則填寫空字串 ""。
Key清單: name, age, look, species, abo, pheromone, spirit, mind, level, ability。
玩家提供文字：${rawText}`;

            try {
                toggleAIFields();
                let aiResponseText = "";
                if (selectedAI === 'gemini') {
                    const apiKey = document.getElementById('api-key').value.trim();
                    if (!apiKey) throw new Error("請先填寫 API Key");
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent?key=${apiKey}`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ role: "user", parts: [{ text: prompt }] }] })
                    });
                    const data = await response.json();
                    if(data.error) throw new Error(data.error.message);
                    aiResponseText = data.candidates[0].content.parts[0].text;
                } else {
                    const localUrl = document.getElementById('local-url').value.trim();
                    const body = { messages: [{ role: "user", content: prompt }], temperature: 0.1 };
                    const response = await fetch(localUrl, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
                    const data = await response.json();
                    aiResponseText = data.choices[0].message.content;
                }
                const jsonMatch = aiResponseText.match(/\{[\s\S]*\}/);
                if (jsonMatch) {
                    const parsedData = JSON.parse(jsonMatch[0]);
                    const fields = ['name', 'age', 'look', 'species', 'pheromone', 'spirit', 'mind', 'ability'];
                    fields.forEach(f => document.getElementById(`start-${f}`).value = parsedData[f] || '');
                    
                    const setSelect = (id, val) => {
                        if(!val) return;
                        const sel = document.getElementById(id);
                        for(let i=0; i<sel.options.length; i++) {
                            if(val.includes(sel.options[i].value)) { sel.selectedIndex = i; break; }
                        }
                    };
                    setSelect('start-abo', parsedData.abo);
                    setSelect('start-level', parsedData.level);
                    togglePheromoneField('start');
                    statusDiv.innerText = "辨識成功！請確認欄位內容。";
                    statusDiv.style.color = "#2ecc71";
                } else throw new Error("無法解析 JSON。");
            } catch (err) {
                statusDiv.innerText = "辨識失敗：" + err.message;
                statusDiv.style.color = "#e74c3c";
            }
        }
    </script>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>哨嚮與獸人：第四區報到</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #1e1e2f;
            color: #dcdcdc;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 開場動畫介面 */
        #intro-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100vh;
            background-color: #0b0b13;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 1s ease-in-out;
        }
        .intro-text {
            color: #4db8ff;
            font-size: 2.5rem;
            letter-spacing: 5px;
            opacity: 0;
            animation: cinematicFadeInOut 4s forwards;
            text-shadow: 0 0 15px rgba(77, 184, 255, 0.5);
        }
        .intro-subtext {
            color: #a3a3c2;
            font-size: 1.2rem;
            letter-spacing: 8px;
            margin-top: 15px;
            opacity: 0;
            animation: cinematicFadeInOut 4s forwards 0.5s;
        }
        @keyframes cinematicFadeInOut {
            0% { opacity: 0; transform: translateY(15px); }
            25% { opacity: 1; transform: translateY(0); }
            75% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-15px); }
        }

        /* 起始頁面樣式 */
        #start-screen {
            display: none; 
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            height: 100vh;
            background-color: #1a1a24;
            overflow-y: auto;
            padding: 40px 20px;
        }
        .form-container {
            background-color: #2a2a40;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 600px;
            margin-bottom: 40px;
        }
        .form-container h1 {
            color: #4db8ff;
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 2px solid #3d3d5c;
            padding-bottom: 10px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #a3a3c2;
            font-weight: bold;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #3d3d5c;
            border-radius: 5px;
            background-color: #1e1e2f;
            color: #fff;
            box-sizing: border-box;
            font-family: inherit;
        }
        .provider-toggle, .parse-section {
            background-color: #3d3d5c;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #4db8ff;
        }
        .help-text {
            font-size: 0.85rem;
            color: #8c8c8c;
            margin-top: 5px;
        }
        .status-text {
            font-size: 0.9rem;
            color: #f39c12;
            margin-top: 10px;
            font-weight: bold;
        }
        .action-btn {
            width: 100%;
            padding: 12px;
            background-color: #2980b9;
            color: #fff;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }
        .action-btn:hover { background-color: #1c5980; }
        .action-btn:disabled { background-color: #555; cursor: not-allowed; }
        
        .start-btn {
            width: 100%;
            padding: 15px;
            background-color: #4db8ff;
            color: #1e1e2f;
            border: none;
            border-radius: 5px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 20px;
        }
        .start-btn:hover { background-color: #2980b9; color: #fff; }

        /* 遊戲介面樣式 */
        #game-screen {
            display: none; 
            width: 100%;
            height: 100vh;
            flex-direction: row;
        }
        #sidebar {
            width: 300px;
            background-color: #2a2a40;
            padding: 20px;
            border-right: 2px solid #3d3d5c;
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
        }
        #sidebar h2 {
            color: #4db8ff;
            font-size: 1.2rem;
            margin-top: 0;
            border-bottom: 1px solid #4db8ff;
            padding-bottom: 10px;
        }
        .status-item {
            background: #1e1e2f;
            padding: 10px;
            border-radius: 5px;
            font-size: 0.9rem;
        }
        #main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        #chat-box {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .message {
            max-width: 80%;
            padding: 15px;
            border-radius: 8px;
            line-height: 1.6;
        }
        .ai-message {
            background-color: #3d3d5c;
            align-self: flex-start;
            border-left: 4px solid #4db8ff;
        }
        .player-message {
            background-color: #4db8ff;
            color: #1e1e2f;
            align-self: flex-end;
            border-right: 4px solid #2980b9;
        }
        #input-area {
            display: flex;
            padding: 20px;
            background-color: #2a2a40;
            border-top: 2px solid #3d3d5c;
        }
        #player-input {
            flex-grow: 1;
            padding: 15px;
            font-size: 1rem;
            border: none;
            border-radius: 5px;
            background-color: #1e1e2f;
            color: #fff;
            outline: none;
        }
        #send-btn {
            padding: 0 25px;
            margin-left: 15px;
            font-size: 1rem;
            background-color: #4db8ff;
            color: #1e1e2f;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }
        #send-btn:hover { background-color: #2980b9; color: #fff; }
        .system-text {
            color: #a3a3c2;
            font-size: 0.9rem;
            text-align: center;
            margin: 10px 0;
            font-style: italic;
        }
    </style>
</head>
<body>

    <!-- 開場動畫 -->
    <div id="intro-screen">
        <div class="intro-text">哨嚮與獸人世界</div>
        <div class="intro-subtext">第四區 報到處</div>
    </div>

    <!-- 起始頁面：角色建立與 API 填寫 -->
    <div id="start-screen">
        <div class="form-container">
            <h1>系統初始設定</h1>
            
            <!-- AI 引擎選擇 -->
            <div class="provider-toggle">
                <div class="form-group">
                    <label>選擇 AI 引擎</label>
                    <select id="ai-provider" onchange="toggleAIFields()">
                        <option value="gemini">Google Gemini API (雲端)</option>
                        <option value="local">Local AI / Ollama / LM Studio (地端)</option>
                    </select>
                </div>
                <div id="gemini-fields">
                    <div class="form-group">
                        <label>Gemini API Key (必填)</label>
                        <input type="password" id="api-key" placeholder="請輸入您的 API 金鑰">
                    </div>
                </div>
                <div id="local-fields" style="display: none;">
                    <div class="form-group">
                        <label>地端 API 網址</label>
                        <input type="text" id="local-url" value="http://localhost:11434/v1/chat/completions">
                        <div class="help-text">請確保伺服器已開啟 CORS 功能。</div>
                    </div>
                    <div class="form-group">
                        <label>模型名稱 (選填)</label>
                        <input type="text" id="local-model" placeholder="例如：llama3">
                    </div>
                </div>
            </div>

            <!-- AI 角色卡辨識 -->
            <div class="parse-section">
                <div class="form-group">
                    <label>快速匯入角色卡（AI 文字辨識）</label>
                    <textarea id="char-parse-text" rows="4" placeholder="請將您的角色設定文字貼在此處，AI 將自動辨識並填入下方表單。請先確認上方 API 已填妥。"></textarea>
                    <button type="button" id="parse-btn" class="action-btn" onclick="parseCharacterText()">自動辨識並填寫</button>
                    <div id="parse-status" class="status-text"></div>
                </div>
            </div>

            <hr style="border-color: #3d3d5c; margin-bottom: 20px;">

            <!-- 角色卡表單 -->
            <form id="setup-form">
                <div class="form-group"><label>姓名</label><input type="text" id="char-name" required></div>
                <div class="form-group"><label>年齡</label><input type="text" id="char-age" required></div>
                <div class="form-group"><label>外貌</label><input type="text" id="char-look" required></div>
                <div class="form-group"><label>種族 / 第一性別</label><input type="text" id="char-species" required></div>
                
                <!-- ABO 選擇，綁定隱藏信息素的功能 -->
                <div class="form-group"><label>二分化性別 (ABO)</label>
                    <select id="char-abo" onchange="togglePheromoneField()">
                        <option value="Alpha">Alpha</option>
                        <option value="Beta">Beta</option>
                        <option value="Omega">Omega</option>
                    </select>
                </div>
                
                <!-- 信息素欄位，獨立 ID 以便控制顯示/隱藏 -->
                <div class="form-group" id="pheromone-group">
                    <label>信息素</label>
                    <input type="text" id="char-pheromone" required>
                </div>
                
                <div class="form-group"><label>精神體型態</label><input type="text" id="char-spirit" required></div>
                <div class="form-group"><label>精神圖景</label><input type="text" id="char-mind" required></div>
                <div class="form-group"><label>哨兵等級</label>
                    <select id="char-level">
                        <option value="S級">S級</option>
                        <option value="A級">A級</option>
                        <option value="B級">B級</option>
                        <option value="C級">C級</option>
                    </select>
                </div>
                <div class="form-group"><label>哨兵特殊能力</label><input type="text" id="char-ability" required></div>
                
                <button type="submit" class="start-btn">確認資料並開始遊戲</button>
            </form>
        </div>
    </div>

    <!-- 遊戲介面 -->
    <div id="game-screen">
        <div id="sidebar">
            <h2>系統狀態欄</h2>
            <div class="status-item" id="status-date">日期｜ 暫無資料</div>
            <div class="status-item" id="status-time">時間｜ 暫無資料</div>
            <div class="status-item" id="status-location">地點｜ 暫無資料</div>
            <div class="status-item" id="status-clothes">艾柏特的穿著｜ 暫無資料</div>
            <div class="status-item" id="status-trust">信任度｜ 暫無資料</div>
            <div class="status-item" id="status-page">頁碼｜ 暫無資料</div>
        </div>
        <div id="main-content">
            <div id="chat-box"></div>
            <div id="input-area">
                <input type="text" id="player-input" placeholder="輸入您的行動或對話，按下 Enter 傳送..." disabled />
                <button id="send-btn" disabled>傳送</button>
            </div>
        </div>
    </div>

    <script>
        // 開場動畫控制
        window.onload = () => {
            setTimeout(() => {
                const introScreen = document.getElementById('intro-screen');
                introScreen.style.opacity = '0';
                setTimeout(() => {
                    introScreen.style.display = 'none';
                    document.getElementById('start-screen').style.display = 'flex';
                }, 1000); // 等待淡出動畫結束
            }, 4000); // 顯示4秒後開始淡出
        };

        // 介面切換邏輯 (API 欄位)
        function toggleAIFields() {
            const provider = document.getElementById('ai-provider').value;
            const geminiFields = document.getElementById('gemini-fields');
            const localFields = document.getElementById('local-fields');
            const apiKeyInput = document.getElementById('api-key');

            if (provider === 'gemini') {
                geminiFields.style.display = 'block';
                localFields.style.display = 'none';
                apiKeyInput.required = true;
            } else {
                geminiFields.style.display = 'none';
                localFields.style.display = 'block';
                apiKeyInput.required = false;
            }
        }

        // 動態隱藏/顯示信息素欄位
        function togglePheromoneField() {
            const abo = document.getElementById('char-abo').value;
            const pheromoneGroup = document.getElementById('pheromone-group');
            const pheromoneInput = document.getElementById('char-pheromone');

            if (abo === 'Beta') {
                pheromoneGroup.style.display = 'none';
                pheromoneInput.required = false;
                pheromoneInput.value = ''; // 切換為Beta時清空信息素
            } else {
                pheromoneGroup.style.display = 'block';
                pheromoneInput.required = true;
            }
        }

        // AI 角色卡文字辨識
        async function parseCharacterText() {
            const rawText = document.getElementById('char-parse-text').value.trim();
            const statusDiv = document.getElementById('parse-status');
            const parseBtn = document.getElementById('parse-btn');
            const provider = document.getElementById('ai-provider').value;
            
            if (!rawText) {
                statusDiv.innerText = "請先貼上角色設定文字。";
                return;
            }

            parseBtn.disabled = true;
            statusDiv.innerText = "AI 辨識中，請稍候...";
            statusDiv.style.color = "#4db8ff";

            const prompt = `請分析以下文字，並將資訊萃取為純 JSON 格式回傳，請勿包含任何 markdown 標記（如 \`\`\`json ）。
如果沒有該資訊，請填寫空字串 ""。若符合選項，請轉換為選項文字。
JSON 必須包含以下 Key：
- name: 姓名
- age: 年齡 (數字或文字皆可)
- look: 外貌描述
- species: 種族 / 第一性別 (例如 獸人/男)
- abo: 必須為 "Alpha", "Beta", 或 "Omega" 其中之一
- pheromone: 信息素
- spirit: 精神體型態
- mind: 精神圖景
- level: 必須為 "S級", "A級", "B級", 或 "C級" 其中之一
- ability: 哨兵特殊能力

【玩家提供文字】：
${rawText}`;

            try {
                let aiResponseText = "";
                
                if (provider === 'gemini') {
                    const apiKey = document.getElementById('api-key').value.trim();
                    if (!apiKey) throw new Error("請先填寫 Gemini API Key");
                    
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-pro:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ role: "user", parts: [{ text: prompt }] }] })
                    });
                    const data = await response.json();
                    if(data.error) throw new Error(data.error.message);
                    aiResponseText = data.candidates[0].content.parts[0].text;
                } else {
                    const localUrl = document.getElementById('local-url').value.trim();
                    const localModel = document.getElementById('local-model').value.trim();
                    
                    const body = { messages: [{ role: "user", content: prompt }], temperature: 0.1 };
                    if (localModel) body.model = localModel;
                    
                    const response = await fetch(localUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(body)
                    });
                    const data = await response.json();
                    aiResponseText = data.choices[0].message.content;
                }

                // 嘗試擷取 JSON
                const jsonMatch = aiResponseText.match(/\{[\s\S]*\}/);
                if (jsonMatch) {
                    const parsedData = JSON.parse(jsonMatch[0]);
                    
                    // 自動填入表單
                    document.getElementById('char-name').value = parsedData.name || '';
                    document.getElementById('char-age').value = parsedData.age || '';
                    document.getElementById('char-look').value = parsedData.look || '';
                    document.getElementById('char-species').value = parsedData.species || '';
                    document.getElementById('char-pheromone').value = parsedData.pheromone || '';
                    document.getElementById('char-spirit').value = parsedData.spirit || '';
                    document.getElementById('char-mind').value = parsedData.mind || '';
                    document.getElementById('char-ability').value = parsedData.ability || '';

                    // 下拉選單處理 (ABO)
                    if (parsedData.abo) {
                        let aboSelect = document.getElementById('char-abo');
                        for(let i=0; i<aboSelect.options.length; i++) {
                            if (parsedData.abo.includes(aboSelect.options[i].value)) {
                                aboSelect.selectedIndex = i; break;
                            }
                        }
                        // 辨識後主動觸發顯示/隱藏信息素欄位
                        togglePheromoneField();
                    }

                    // 下拉選單處理 (哨兵等級)
                    if (parsedData.level) {
                        let lvlSelect = document.getElementById('char-level');
                        for(let i=0; i<lvlSelect.options.length; i++) {
                            if (parsedData.level.includes(lvlSelect.options[i].value)) {
                                lvlSelect.selectedIndex = i; break;
                            }
                        }
                    }
                    
                    statusDiv.innerText = "辨識成功！請確認下方欄位內容是否正確。";
                    statusDiv.style.color = "#2ecc71";
                } else {
                    throw new Error("無法從 AI 回覆中解析 JSON 格式。");
                }
            } catch (error) {
                console.error(error);
                statusDiv.innerText = "辨識失敗：" + error.message;
                statusDiv.style.color = "#e74c3c";
            } finally {
                parseBtn.disabled = false;
            }
        }

        // 系統變數與遊戲初始化邏輯
        let selectedAI = 'gemini';
        let geminiApiKey = '';
        let localApiUrl = '';
        let localModelName = '';
        let chatHistory = []; 

        const startScreen = document.getElementById('start-screen');
        const gameScreen = document.getElementById('game-screen');
        const chatBox = document.getElementById('chat-box');
        const playerInput = document.getElementById('player-input');
        const sendBtn = document.getElementById('send-btn');

        document.getElementById('setup-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            selectedAI = document.getElementById('ai-provider').value;
            if (selectedAI === 'gemini') {
                geminiApiKey = document.getElementById('api-key').value.trim();
            } else {
                localApiUrl = document.getElementById('local-url').value.trim();
                localModelName = document.getElementById('local-model').value.trim();
            }

            // 處理信息素狀態，若為 Beta 則強制設定內容
            const aboValue = document.getElementById('char-abo').value;
            const pheromoneValue = aboValue === 'Beta' ? '無（Beta沒有信息素）' : document.getElementById('char-pheromone').value;

            const charData = `
【玩家角色卡資料】
姓名：${document.getElementById('char-name').value}
年齡：${document.getElementById('char-age').value}
外貌：${document.getElementById('char-look').value}
種族/性別：${document.getElementById('char-species').value}
二分化性別：${aboValue}
信息素：${pheromoneValue}
精神體型態：${document.getElementById('char-spirit').value}
精神圖景：${document.getElementById('char-mind').value}
哨兵等級：${document.getElementById('char-level').value}
哨兵特殊能力：${document.getElementById('char-ability').value}
`;

            const systemPrompt = `你是艾柏特·科摩多世界中的旁白敘述者，專責描述劇情發展、角色動作、心理變化與空間氛圍。你不扮演玩家角色，也不以第一人稱參與事件，而是以小說體形式，從第三人稱視角為使用者開展完整的虛構世界體驗。這個世界沒有人類，都是獸人。

以下是剛建檔完畢的新人哨兵資料：
${charData}

請根據以上資料，作為遊戲的開場。直接輸出《艾柏特開場事件》的情節：玩家剛下車踏入第四區的大廳尋找報到櫃檯，艾柏特·科摩多（S級嚮導、科摩多巨蜥獸人）主動出現搭話。請融合玩家的角色設定進行細緻描寫，並嚴格維持第三人稱視角。

在每則回覆的最底下，務必包含以下狀態欄格式：
日期｜ YY/MM/DD 
時間｜ HH:MM （24小時制）
地點｜（依劇情變動） 
艾柏特的穿著｜（依劇情及艾柏特喜好變動，他工作日會穿制服）
艾柏特對你的信任度｜（從0開始）
頁碼｜（從page 1 開始）`;

            chatHistory.push({ role: 'system', content: systemPrompt });

            startScreen.style.display = 'none';
            gameScreen.style.display = 'flex';
            document.body.style.overflow = 'hidden'; 
            
            appendSystemText('系統讀取中，正在連接 AI 引擎生成第四區開場劇情...');
            await requestAI("");
        });

        function appendSystemText(text) {
            const sysText = document.createElement('div');
            sysText.className = 'system-text';
            sysText.innerText = text;
            chatBox.appendChild(sysText);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function appendMessage(role, text) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message');
            msgDiv.classList.add(role === 'user' ? 'player-message' : 'ai-message');
            msgDiv.innerHTML = text.replace(/\n/g, '<br>');
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function requestAI(userText) {
            document.querySelectorAll('.system-text').forEach(el => el.remove());
            if (userText) {
                appendMessage('user', userText);
                chatHistory.push({ role: 'user', content: userText });
            }
            playerInput.disabled = true;
            sendBtn.disabled = true;

            try {
                let aiResponseText = '';
                if (selectedAI === 'gemini') {
                    aiResponseText = await fetchGemini();
                } else {
                    aiResponseText = await fetchLocal();
                }
                if (aiResponseText) {
                    appendMessage('assistant', aiResponseText);
                    chatHistory.push({ role: 'assistant', content: aiResponseText });
                }
            } catch (error) {
                console.error("API 錯誤:", error);
                appendSystemText(`發生錯誤：${error.message}`);
                if(userText) chatHistory.pop();
            } finally {
                playerInput.disabled = false;
                sendBtn.disabled = false;
                playerInput.focus();
            }
        }

        async function fetchGemini() {
            const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-pro:generateContent?key=${geminiApiKey}`;
            let geminiContents = [];
            let systemText = "";
            for (let i = 0; i < chatHistory.length; i++) {
                const msg = chatHistory[i];
                if (msg.role === 'system') {
                    systemText = msg.content;
                } else if (msg.role === 'user') {
                    let finalContent = msg.content;
                    if (systemText) {
                        finalContent = systemText + "\n\n【玩家行動】：\n" + (finalContent || "開始遊戲");
                        systemText = ""; 
                    }
                    geminiContents.push({ role: "user", parts: [{ text: finalContent }] });
                } else if (msg.role === 'assistant') {
                    geminiContents.push({ role: "model", parts: [{ text: msg.content }] });
                }
            }
            if (geminiContents.length === 0 && systemText) {
                geminiContents.push({ role: "user", parts: [{ text: systemText + "\n\n【請開始遊戲的開場描述】" }] });
            }

            const response = await fetch(apiUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: geminiContents })
            });
            const data = await response.json();
            if (data.candidates && data.candidates[0].content.parts[0].text) {
                return data.candidates[0].content.parts[0].text;
            } else {
                throw new Error("Gemini 回傳異常或 API Key 錯誤。");
            }
        }

        async function fetchLocal() {
            const body = { messages: chatHistory, temperature: 0.7, max_tokens: 2000 };
            if (localModelName) body.model = localModelName;
            if (chatHistory.length === 1 && chatHistory[0].role === 'system') {
                body.messages = [...chatHistory, { role: 'user', content: '開始遊戲的開場描述' }];
            }

            const response = await fetch(localApiUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            const data = await response.json();
            if (data.choices && data.choices[0].message.content) {
                return data.choices[0].message.content;
            } else {
                throw new Error("地端 AI 回傳異常。請確認 CORS 與模型狀態。");
            }
        }

        sendBtn.addEventListener('click', () => {
            const text = playerInput.value.trim();
            if (text) { playerInput.value = ''; requestAI(text); }
        });

        playerInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter' && !playerInput.disabled) {
                const text = playerInput.value.trim();
                if (text) { playerInput.value = ''; requestAI(text); }
            }
        });
    </script>
</body>
</html>

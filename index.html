<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>哨嚮與獸人：第四區報到</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #1e1e2f;
            color: #dcdcdc;
            display: flex;
            height: 100vh;
        }
        /* 側邊狀態欄 */
        #sidebar {
            width: 300px;
            background-color: #2a2a40;
            padding: 20px;
            border-right: 2px solid #3d3d5c;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        #sidebar h2 {
            color: #4db8ff;
            font-size: 1.2rem;
            margin-top: 0;
            border-bottom: 1px solid #4db8ff;
            padding-bottom: 10px;
        }
        .status-item {
            background: #1e1e2f;
            padding: 10px;
            border-radius: 5px;
            font-size: 0.9rem;
        }
        /* 主要對話區 */
        #main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }
        #chat-box {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .message {
            max-width: 80%;
            padding: 15px;
            border-radius: 8px;
            line-height: 1.6;
        }
        .ai-message {
            background-color: #3d3d5c;
            align-self: flex-start;
            border-left: 4px solid #4db8ff;
        }
        .player-message {
            background-color: #4db8ff;
            color: #1e1e2f;
            align-self: flex-end;
            border-right: 4px solid #2980b9;
        }
        /* 輸入區 */
        #input-area {
            display: flex;
            padding: 20px;
            background-color: #2a2a40;
            border-top: 2px solid #3d3d5c;
        }
        #player-input {
            flex-grow: 1;
            padding: 15px;
            font-size: 1rem;
            border: none;
            border-radius: 5px;
            background-color: #1e1e2f;
            color: #fff;
            outline: none;
        }
        #send-btn {
            padding: 0 25px;
            margin-left: 15px;
            font-size: 1rem;
            background-color: #4db8ff;
            color: #1e1e2f;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }
        #send-btn:hover {
            background-color: #2980b9;
            color: #fff;
        }
    </style>
</head>
<body>

    <!-- 側邊狀態欄 -->
    <div id="sidebar">
        <h2>系統狀態</h2>
        <div class="status-item" id="status-date">日期｜ YY/MM/DD</div>
        <div class="status-item" id="status-time">時間｜ HH:MM</div>
        <div class="status-item" id="status-location">地點｜ 第四區大廳</div>
        <div class="status-item" id="status-clothes">艾柏特的穿著｜ 黑色嚮導制服</div>
        <div class="status-item" id="status-trust">信任度｜ 0</div>
        <div class="status-item" id="status-page">頁碼｜ page 1</div>
    </div>

    <!-- 主要對話與輸入區 -->
    <div id="main-content">
        <div id="chat-box">
            <div class="message ai-message">
                <strong>[系統提示]</strong> 歡迎來到哨嚮與獸人世界。請輸入您的角色卡資料來開始遊戲：<br>
                1. 姓名<br>
                2. 年齡<br>
                3. 外貌<br>
                4. 種族/性別<br>
                5. 二分化性別<br>
                6. 信息素（Beta無）<br>
                7. 精神體型態<br>
                8. 精神圖景<br>
                9. 哨兵等級<br>
                10. 哨兵特殊能力
            </div>
        </div>
        <div id="input-area">
            <input type="text" id="player-input" placeholder="輸入您的行動或角色資料，按下 Enter 傳送..." />
            <button id="send-btn">傳送</button>
        </div>
    </div>

    <script>
        // 設定區：請將此處替換為您的 API 金鑰
        const API_KEY = 'YOUR_API_KEY'; 
        const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-pro:generateContent?key=${API_KEY}`;

        // 系統提示詞（System Prompt）整合了世界觀與角色規則
        const systemPrompt = `
你是艾柏特·科摩多世界中的旁白敘述者，專責描述劇情發展、角色動作、心理變化與空間氛圍。
你不扮演玩家角色，也不以第一人稱參與事件，而是以小說體形式，從第三人稱視角為使用者開展完整的虛構世界體驗。
這個世界沒有人類，都是獸人。
請根據玩家輸入的角色卡資料，協助建立角色，並銜接開場事件：玩家剛結束基礎訓練被派發到第四區，艾柏特主動搭話。
在每則回覆最底下，請務必顯示狀態欄列表。狀態欄格式如下：
日期｜ YY/MM/DD 
時間｜ HH:MM 
地點｜（依劇情變動） 
艾柏特的穿著｜（依劇情及艾柏特喜好變動）
艾柏特對你的信任度｜（從0開始）
頁碼｜（從page 1 開始累加）
`;

        // 儲存對話歷史紀錄
        let conversationHistory = [
            {
                "role": "user",
                "parts": [{ "text": systemPrompt }]
            },
            {
                "role": "model",
                "parts": [{ "text": "已了解。請玩家提供角色卡資料，我將為您銜接第四區大廳的開場事件。" }]
            }
        ];

        const chatBox = document.getElementById('chat-box');
        const playerInput = document.getElementById('player-input');
        const sendBtn = document.getElementById('send-btn');

        // 更新對話畫面
        function appendMessage(role, text) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message');
            msgDiv.classList.add(role === 'user' ? 'player-message' : 'ai-message');
            // 將換行符號轉為 <br> 以便在 HTML 中顯示
            msgDiv.innerHTML = text.replace(/\n/g, '<br>');
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // 呼叫 API
        async function callAI() {
            const text = playerInput.value.trim();
            if (!text) return;

            // 顯示玩家訊息並清空輸入框
            appendMessage('user', text);
            playerInput.value = '';
            playerInput.disabled = true;
            sendBtn.disabled = true;

            // 將玩家輸入加入歷史紀錄
            conversationHistory.push({
                "role": "user",
                "parts": [{ "text": text }]
            });

            try {
                // 傳送請求至 AI API
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: conversationHistory })
                });

                const data = await response.json();
                
                if (data.candidates && data.candidates[0].content.parts[0].text) {
                    const aiResponseText = data.candidates[0].content.parts[0].text;
                    appendMessage('model', aiResponseText);
                    
                    // 將 AI 回覆加入歷史紀錄
                    conversationHistory.push({
                        "role": "model",
                        "parts": [{ "text": aiResponseText }]
                    });
                } else {
                    appendMessage('model', '系統發生錯誤，無法取得回覆。');
                }
            } catch (error) {
                console.error("API 呼叫失敗:", error);
                appendMessage('model', '網路錯誤或 API Key 未設定。請檢查控制台。');
            } finally {
                playerInput.disabled = false;
                sendBtn.disabled = false;
                playerInput.focus();
            }
        }

        // 綁定事件
        sendBtn.addEventListener('click', callAI);
        playerInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                callAI();
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>哨嚮與獸人：第四區報到</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #1e1e2f;
            color: #dcdcdc;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 起始頁面樣式 */
        #start-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            height: 100vh;
            background-color: #1a1a24;
            overflow-y: auto;
            padding: 40px 20px;
        }
        .form-container {
            background-color: #2a2a40;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 600px;
        }
        .form-container h1 {
            color: #4db8ff;
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 2px solid #3d3d5c;
            padding-bottom: 10px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #a3a3c2;
            font-weight: bold;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #3d3d5c;
            border-radius: 5px;
            background-color: #1e1e2f;
            color: #fff;
            box-sizing: border-box;
            font-family: inherit;
        }
        .provider-toggle {
            background-color: #3d3d5c;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #4db8ff;
        }
        .help-text {
            font-size: 0.85rem;
            color: #8c8c8c;
            margin-top: 5px;
        }
        .start-btn {
            width: 100%;
            padding: 15px;
            background-color: #4db8ff;
            color: #1e1e2f;
            border: none;
            border-radius: 5px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 20px;
        }
        .start-btn:hover {
            background-color: #2980b9;
            color: #fff;
        }

        /* 遊戲介面樣式 */
        #game-screen {
            display: none; /* 初始隱藏 */
            width: 100%;
            height: 100vh;
            flex-direction: row;
        }
        #sidebar {
            width: 300px;
            background-color: #2a2a40;
            padding: 20px;
            border-right: 2px solid #3d3d5c;
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
        }
        #sidebar h2 {
            color: #4db8ff;
            font-size: 1.2rem;
            margin-top: 0;
            border-bottom: 1px solid #4db8ff;
            padding-bottom: 10px;
        }
        .status-item {
            background: #1e1e2f;
            padding: 10px;
            border-radius: 5px;
            font-size: 0.9rem;
        }
        #main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        #chat-box {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .message {
            max-width: 80%;
            padding: 15px;
            border-radius: 8px;
            line-height: 1.6;
        }
        .ai-message {
            background-color: #3d3d5c;
            align-self: flex-start;
            border-left: 4px solid #4db8ff;
        }
        .player-message {
            background-color: #4db8ff;
            color: #1e1e2f;
            align-self: flex-end;
            border-right: 4px solid #2980b9;
        }
        #input-area {
            display: flex;
            padding: 20px;
            background-color: #2a2a40;
            border-top: 2px solid #3d3d5c;
        }
        #player-input {
            flex-grow: 1;
            padding: 15px;
            font-size: 1rem;
            border: none;
            border-radius: 5px;
            background-color: #1e1e2f;
            color: #fff;
            outline: none;
        }
        #send-btn {
            padding: 0 25px;
            margin-left: 15px;
            font-size: 1rem;
            background-color: #4db8ff;
            color: #1e1e2f;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }
        #send-btn:hover {
            background-color: #2980b9;
            color: #fff;
        }
        .system-text {
            color: #a3a3c2;
            font-size: 0.9rem;
            text-align: center;
            margin: 10px 0;
            font-style: italic;
        }
    </style>
</head>
<body>

    <!-- 起始頁面：角色建立與 API 填寫 -->
    <div id="start-screen">
        <div class="form-container">
            <h1>哨嚮與獸人世界：第四區報到</h1>
            
            <form id="setup-form">
                <!-- AI 引擎選擇 -->
                <div class="provider-toggle">
                    <div class="form-group">
                        <label>選擇 AI 引擎</label>
                        <select id="ai-provider" onchange="toggleAIFields()">
                            <option value="gemini">Google Gemini API (雲端)</option>
                            <option value="local">Local AI / Ollama / LM Studio (地端)</option>
                        </select>
                    </div>

                    <!-- Gemini 設定 -->
                    <div id="gemini-fields">
                        <div class="form-group">
                            <label>Gemini API Key (必填)</label>
                            <input type="password" id="api-key" placeholder="請輸入您的 API 金鑰">
                        </div>
                    </div>

                    <!-- 地端 AI 設定 -->
                    <div id="local-fields" style="display: none;">
                        <div class="form-group">
                            <label>地端 API 網址</label>
                            <input type="text" id="local-url" value="http://localhost:11434/v1/chat/completions" placeholder="預設為 Ollama 的相容網址">
                            <div class="help-text">提示：LM Studio 預設通常為 http://127.0.0.1:1234/v1/chat/completions。<br>請確保您的地端伺服器已開啟 CORS。</div>
                        </div>
                        <div class="form-group">
                            <label>模型名稱 (選填)</label>
                            <input type="text" id="local-model" placeholder="例如：llama3">
                        </div>
                    </div>
                </div>

                <hr style="border-color: #3d3d5c; margin-bottom: 20px;">

                <!-- 角色卡設定 -->
                <div class="form-group"><label>姓名</label><input type="text" id="char-name" placeholder="例如：伊薩爾" required></div>
                <div class="form-group"><label>年齡</label><input type="number" id="char-age" placeholder="例如：22" required></div>
                <div class="form-group"><label>外貌</label><input type="text" id="char-look" placeholder="例如：黑色短髮、帶有垂耳兔特徵" required></div>
                <div class="form-group"><label>種族 / 第一性別</label><input type="text" id="char-species" placeholder="例如：垂耳兔獸人 / 男" required></div>
                <div class="form-group"><label>二分化性別 (ABO)</label>
                    <select id="char-abo">
                        <option value="Alpha">Alpha</option>
                        <option value="Beta">Beta</option>
                        <option value="Omega">Omega</option>
                    </select>
                </div>
                <div class="form-group"><label>信息素 (Beta請填無)</label><input type="text" id="char-pheromone" placeholder="例如：清冷的薄荷味" required></div>
                <div class="form-group"><label>精神體型態</label><input type="text" id="char-spirit" placeholder="例如：雪鴞" required></div>
                <div class="form-group"><label>精神圖景</label><input type="text" id="char-mind" placeholder="例如：寂靜的冰原" required></div>
                <div class="form-group"><label>哨兵等級</label>
                    <select id="char-level">
                        <option value="S級">S級</option>
                        <option value="A級">A級</option>
                        <option value="B級">B級</option>
                        <option value="C級">C級</option>
                    </select>
                </div>
                <div class="form-group"><label>哨兵特殊能力</label><input type="text" id="char-ability" placeholder="例如：極致動態視力、近戰強化" required></div>
                
                <button type="submit" class="start-btn">建立角色並開始遊戲</button>
            </form>
        </div>
    </div>

    <!-- 遊戲介面 -->
    <div id="game-screen">
        <div id="sidebar">
            <h2>系統狀態欄</h2>
            <div class="status-item" id="status-date">日期｜ 暫無資料</div>
            <div class="status-item" id="status-time">時間｜ 暫無資料</div>
            <div class="status-item" id="status-location">地點｜ 暫無資料</div>
            <div class="status-item" id="status-clothes">艾柏特的穿著｜ 暫無資料</div>
            <div class="status-item" id="status-trust">信任度｜ 暫無資料</div>
            <div class="status-item" id="status-page">頁碼｜ 暫無資料</div>
        </div>

        <div id="main-content">
            <div id="chat-box"></div>
            <div id="input-area">
                <input type="text" id="player-input" placeholder="輸入您的行動或對話，按下 Enter 傳送..." disabled />
                <button id="send-btn" disabled>傳送</button>
            </div>
        </div>
    </div>

    <script>
        // 介面切換邏輯
        function toggleAIFields() {
            const provider = document.getElementById('ai-provider').value;
            const geminiFields = document.getElementById('gemini-fields');
            const localFields = document.getElementById('local-fields');
            const apiKeyInput = document.getElementById('api-key');

            if (provider === 'gemini') {
                geminiFields.style.display = 'block';
                localFields.style.display = 'none';
                apiKeyInput.required = true;
            } else {
                geminiFields.style.display = 'none';
                localFields.style.display = 'block';
                apiKeyInput.required = false;
            }
        }

        // 系統變數
        let selectedAI = 'gemini';
        let geminiApiKey = '';
        let localApiUrl = '';
        let localModelName = '';
        let chatHistory = []; // 內部統一歷史紀錄：{role: 'system'|'user'|'assistant', content: '...'}

        const startScreen = document.getElementById('start-screen');
        const gameScreen = document.getElementById('game-screen');
        const chatBox = document.getElementById('chat-box');
        const playerInput = document.getElementById('player-input');
        const sendBtn = document.getElementById('send-btn');

        // 表單送出：初始化遊戲
        document.getElementById('setup-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            selectedAI = document.getElementById('ai-provider').value;
            if (selectedAI === 'gemini') {
                geminiApiKey = document.getElementById('api-key').value.trim();
            } else {
                localApiUrl = document.getElementById('local-url').value.trim();
                localModelName = document.getElementById('local-model').value.trim();
            }

            const charData = `
【玩家角色卡資料】
姓名：${document.getElementById('char-name').value}
年齡：${document.getElementById('char-age').value}
外貌：${document.getElementById('char-look').value}
種族/性別：${document.getElementById('char-species').value}
二分化性別：${document.getElementById('char-abo').value}
信息素：${document.getElementById('char-pheromone').value}
精神體型態：${document.getElementById('char-spirit').value}
精神圖景：${document.getElementById('char-mind').value}
哨兵等級：${document.getElementById('char-level').value}
哨兵特殊能力：${document.getElementById('char-ability').value}
`;

            const systemPrompt = `你是艾柏特·科摩多世界中的旁白敘述者，專責描述劇情發展、角色動作、心理變化與空間氛圍。你不扮演玩家角色，也不以第一人稱參與事件，而是以小說體形式，從第三人稱視角為使用者開展完整的虛構世界體驗。這個世界沒有人類，都是獸人。

以下是剛建檔完畢的新人哨兵資料：
${charData}

請根據以上資料，作為遊戲的開場。直接輸出《艾柏特開場事件》的情節：玩家剛下車踏入第四區的大廳尋找報到櫃檯，艾柏特·科摩多（S級嚮導、科摩多巨蜥獸人）主動出現搭話。請融合玩家的角色設定進行細緻描寫，並嚴格維持第三人稱視角。

在每則回覆的最底下，務必包含以下狀態欄格式：
日期｜ YY/MM/DD 
時間｜ HH:MM （24小時制）
地點｜（依劇情變動） 
艾柏特的穿著｜（依劇情及艾柏特喜好變動，他工作日會穿制服）
艾柏特對你的信任度｜（從0開始）
頁碼｜（從page 1 開始）`;

            // 存入系統設定
            chatHistory.push({ role: 'system', content: systemPrompt });

            startScreen.style.display = 'none';
            gameScreen.style.display = 'flex';
            
            appendSystemText('系統讀取中，正在連接 AI 引擎生成第四區開場劇情...');
            
            // 觸發第一句 (以空內容當作觸發)
            await requestAI("");
        });

        function appendSystemText(text) {
            const sysText = document.createElement('div');
            sysText.className = 'system-text';
            sysText.innerText = text;
            chatBox.appendChild(sysText);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function appendMessage(role, text) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message');
            msgDiv.classList.add(role === 'user' ? 'player-message' : 'ai-message');
            msgDiv.innerHTML = text.replace(/\n/g, '<br>');
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // 向 AI 發送請求的路由機制
        async function requestAI(userText) {
            // 移除舊的系統提示文字
            document.querySelectorAll('.system-text').forEach(el => el.remove());

            if (userText) {
                appendMessage('user', userText);
                chatHistory.push({ role: 'user', content: userText });
            }

            playerInput.disabled = true;
            sendBtn.disabled = true;

            try {
                let aiResponseText = '';
                if (selectedAI === 'gemini') {
                    aiResponseText = await fetchGemini();
                } else {
                    aiResponseText = await fetchLocal();
                }

                if (aiResponseText) {
                    appendMessage('assistant', aiResponseText);
                    chatHistory.push({ role: 'assistant', content: aiResponseText });
                }
            } catch (error) {
                console.error("API 錯誤:", error);
                appendSystemText(`發生錯誤：${error.message}`);
                // 如果是發生錯誤，把剛剛加進去的 userText 移除，讓玩家可以重試
                if(userText) chatHistory.pop();
            } finally {
                playerInput.disabled = false;
                sendBtn.disabled = false;
                playerInput.focus();
            }
        }

        // Gemini API 處理邏輯
        async function fetchGemini() {
            const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-pro:generateContent?key=${geminiApiKey}`;
            
            // 將通用格式轉換為 Gemini 格式
            // 註：Gemini 的 REST API 無法輕易插入獨立的 system role，所以將其與 user 的第一句話合併
            let geminiContents = [];
            let systemText = "";
            
            for (let i = 0; i < chatHistory.length; i++) {
                const msg = chatHistory[i];
                if (msg.role === 'system') {
                    systemText = msg.content;
                } else if (msg.role === 'user') {
                    // 如果是第一句 User 且有 System 設定，就把 System 加在前面
                    let finalContent = msg.content;
                    if (systemText) {
                        finalContent = systemText + "\\n\\n【玩家行動】：\\n" + (finalContent || "開始遊戲");
                        systemText = ""; // 只加一次
                    }
                    geminiContents.push({ role: "user", parts: [{ text: finalContent }] });
                } else if (msg.role === 'assistant') {
                    geminiContents.push({ role: "model", parts: [{ text: msg.content }] });
                }
            }

            // 防呆：如果是初始狀態 (只有 system)，主動補一個 user 觸發點
            if (geminiContents.length === 0 && systemText) {
                geminiContents.push({ role: "user", parts: [{ text: systemText + "\\n\\n【請開始遊戲的開場描述】" }] });
            }

            const response = await fetch(apiUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: geminiContents })
            });

            const data = await response.json();
            if (data.candidates && data.candidates[0].content.parts[0].text) {
                return data.candidates[0].content.parts[0].text;
            } else {
                throw new Error("Gemini 回傳格式異常或 API Key 錯誤。");
            }
        }

        // 地端 AI 處理邏輯 (相容 OpenAI 格式)
        async function fetchLocal() {
            const body = {
                messages: chatHistory,
                temperature: 0.7,
                max_tokens: 2000
            };
            
            if (localModelName) {
                body.model = localModelName;
            }

            // 防呆：如果是初始狀態且只有 system，主動補一個 user 發言，因為某些地端模型不支援純 system 起手
            if (chatHistory.length === 1 && chatHistory[0].role === 'system') {
                body.messages = [...chatHistory, { role: 'user', content: '開始遊戲的開場描述' }];
            }

            const response = await fetch(localApiUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });

            const data = await response.json();
            if (data.choices && data.choices[0].message.content) {
                return data.choices[0].message.content;
            } else {
                throw new Error("地端 AI 回傳格式異常。請確認 CORS 與模型狀態。");
            }
        }

        // 綁定輸入事件
        sendBtn.addEventListener('click', () => {
            const text = playerInput.value.trim();
            if (text) {
                playerInput.value = '';
                requestAI(text);
            }
        });

        playerInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter' && !playerInput.disabled) {
                const text = playerInput.value.trim();
                if (text) {
                    playerInput.value = '';
                    requestAI(text);
                }
            }
        });
    </script>
</body>
</html>
